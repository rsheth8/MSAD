name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
        env:
          # Build must succeed without any API keys configured
          NODE_ENV: production

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run build
        env:
          NODE_ENV: production

      - run: npm run test:e2e
        env:
          CI: true
